<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="shortcut icon" href="/weather-app4.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="loading"><img src="/Spinner@1x-1.0s-215px-215px.svg" alt="loading..."></section>
    <section id="connection-error">
        <div id="centered">
            <video src="Connection Lost.mp4" autoplay loop muted></video>
            <div id="action">
                <p>check your internet connection</p>
                <button id="reload">Reload</button>
            </div>
        </div>
    </section>
    <main id="content">
        <section id="page">
             <section id="weather">
                <div id="search">
                    <span class="icon"><i class="fa-brands fa-sistrix fa-bounce fa-xl"></i></span>
                    <input type="text" id="query-field" placeholder="Search city...">
                    <button id="clear" type="button"><i class="fa-solid fa-xmark fa-shake fa-lg"></i></button>
                <button id="search-btn" type="button">Search</button>
                </div>
                <section id="weather-container"></section>
            </section>
            <section id="wrapper">
                <div id="charts">
                    <div id="line">
                        <canvas id="plot"></canvas>
                    </div>
                    <div id="bar">
                        <canvas id="plot1"></canvas>
                    </div>
                </div>
                <div id="forecast-wrapper">
                    <p style="color:white;">weekly</p>
                    <div id="carousel">
                        <button id="prev"><i class="fa-solid fa-caret-left"></i></button>
                        <button id="next"><i class="fa-solid fa-caret-right"></i></button>
                        <div id="forecast"></div>
                    </div>
                </div>
            </section>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://kit.fontawesome.com/cd34c47df6.js" crossorigin="anonymous"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
